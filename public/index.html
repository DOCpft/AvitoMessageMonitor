<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avito Messages Monitor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #messages { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; background: #f9f9f9; }
    .message { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .sender { font-weight: bold; color: #2c3e50; }
    .time { font-size: 0.8em; color: #7f8c8d; margin-left: 10px; }
    .text { margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Сообщения от Рушана</h1>
  <div id="status">Подключение...</div>
  <div id="messages"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const messagesDiv = document.getElementById('messages');
    const statusDiv = document.getElementById('status');

    socket.on('connect', () => {
      statusDiv.textContent = 'Подключено к серверу';
      statusDiv.style.color = 'green';
    });

    socket.on('disconnect', () => {
      statusDiv.textContent = 'Соединение потеряно';
      statusDiv.style.color = 'red';
    });

    socket.on('newMessage', (msg) => {
      const messageEl = document.createElement('div');
      messageEl.className = 'message';
      messageEl.innerHTML = `
        <div><span class="sender">${msg.sender}</span><span class="time">${new Date(msg.timestamp).toLocaleString()}</span></div>
        <div class="text">${msg.text}</div>
      `;
      messagesDiv.prepend(messageEl);
    });
  </script>
</body>
</html>
